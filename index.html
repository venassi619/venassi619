<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pegasus Products Int</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:Arial, sans-serif;
  color:#111;
  background:#fff;
  line-height:1.5;
  text-align:center;
}

header{
  width:100%;
  padding:2rem 0;
  border-bottom:1px solid #ccc;
}

header img.logo{
  max-width:200px;
  height:auto;
  display:block;
  margin:0 auto;
}

/* ===== NAVIGATION ===== */

nav{
  display:flex;
  justify-content:center;
  align-items:center;
  border-bottom:1px solid #ccc;
  width:100%;
  max-width:1100px;
  margin:0 auto;
  position:relative;
}

.nav-links{
  display:flex;
  width:100%;
  justify-content:center;
}

nav button{
  flex:1 1 auto;
  padding:1rem;
  border:none;
  background:none;
  font-weight:700;
  cursor:pointer;
  transition:background .18s;
}

nav button:hover,
nav button.active{
  background:#f0f0f0;
  color:#000;
}

/* Hamburger (hidden on desktop) */
.menu-toggle{
  display:none;
  font-size:1.8rem;
  background:none;
  border:none;
  cursor:pointer;
  padding:1rem;
}

/* ===== MAIN ===== */

main{
  max-width:1100px;
  margin:1.5rem auto;
  padding:0 1rem 2rem;
}

/* ===== SERVICES ===== */

.services-grid{
  display:grid;
  gap:1rem;
  grid-template-columns:repeat(3,1fr);
  margin-top:1rem;
}

.service{
  border:2px solid #000;
  padding:1rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:220px;
}

.service h3{ margin:.4rem 0; }
.service img{ max-width:100%; height:auto; margin:.75rem 0; }
.service p{ font-size:.96rem; }

/* ===== FOUNDERS ===== */

.founders{
  display:flex;
  flex-direction:column;
  gap:1.5rem;
  margin-top:1.5rem;
}

.founder{
  display:flex;
  gap:1.25rem;
  align-items:flex-start;
  padding:1rem;
  border-radius:6px;
  box-shadow:0 6px 18px rgba(0,0,0,0.03);
  text-align:left;
}

.founder img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:50%;
}

.founder-text p{
  font-size:.95rem;
}

/* ===== RESPONSIVE ===== */

@media(max-width:1024px){
  .services-grid{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:700px){

  /* Show hamburger */
  .menu-toggle{
    display:block;
    position:absolute;
    left:0;
  }

  /* Hide nav links by default */
  .nav-links{
    display:none;
    flex-direction:column;
    width:100%;
    margin-top:3.5rem;
  }

  .nav-links.open{
    display:flex;
  }

  .nav-links button{
    width:100%;
    border-top:1px solid #eee;
  }

  .services-grid{ grid-template-columns:1fr; }

  .founder{
    flex-direction:column;
    text-align:center;
  }

  .founder img{ margin-bottom:8px; }
}

*:focus{ outline:none; }
</style>
</head>

<body>

<header>
  <img src="images/7.png" alt="Company Logo" class="logo">
</header>

<nav>
  <button class="menu-toggle">&#9776;</button>
  <div class="nav-links">
    <button class="tab active" data-content="services">Services</button>
    <button class="tab" data-content="brands">Brands</button>
    <button class="tab" data-content="sponsors">Sponsors</button>
    <button class="tab" data-content="about">About</button>
    <button class="tab" data-content="contact">Contact</button>
  </div>
</nav>

<main id="content"></main>

<script>

/* ===== MOBILE MENU TOGGLE ===== */
const menuToggle = document.querySelector('.menu-toggle');
const navLinks = document.querySelector('.nav-links');

menuToggle.addEventListener('click',()=>{
  navLinks.classList.toggle('open');
});

/* ===== CONTENT SYSTEM ===== */

const contentArea = document.getElementById('content');
const tabs = Array.from(document.querySelectorAll('.tab'));

const content = {
  services: `<h2 class="page-title">Our Services</h2>
  <div class="services-grid">
    <div class="service">
      <h3>Supply Chain Logistics & Management</h3>
      <p>We provide tailored logistics solutions designed to simplify and streamline the movement of goods across borders.</p>
    </div>
    <div class="service">
      <h3>Trade & Market Research Consulting</h3>
      <p>We offer detailed research to help businesses identify opportunities and navigate trade barriers.</p>
    </div>
    <div class="service">
      <h3>Innovation & Product Development Support</h3>
      <p>We assist entrepreneurs in bringing innovative concepts to life from prototype to production.</p>
    </div>
  </div>`,

  brands:`<h2 class="page-title">Brands</h2><p>Brand content unchanged.</p>`,

  sponsors:`<h2 class="page-title">Sponsors</h2><p>Sponsor content unchanged.</p>`,

  about:`<h2 class="page-title">Founders</h2><p>About content unchanged.</p>`,

  contact:`<h2 class="page-title">Contact Us</h2><p>Contact form unchanged.</p>`
};

function setActive(tabName){
  tabs.forEach(t=>{
    if(t.dataset.content===tabName){
      t.classList.add('active');
    }else{
      t.classList.remove('active');
    }
  });
}

function loadContent(name){
  contentArea.innerHTML = content[name];
  setActive(name);

  /* Close mobile menu after click */
  if(window.innerWidth<=700){
    navLinks.classList.remove('open');
  }
}

tabs.forEach(tab=>{
  tab.addEventListener('click',()=>{
    loadContent(tab.dataset.content);
  });
});

/* Initial load */
loadContent('services');

</script>
</body>
</html>
